<!DOCTYPE html>
<html>
<head>
    <title>Non-HDL Clinical Calculator</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e6f0ff, #f4f9ff);
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 500px;
        }

        h1 {
            text-align: center;
            color: #003366;
            margin-bottom: 30px;
        }

        h2 {
            color: #003366;
            margin-top: 25px;
        }

        label {
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 20px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.4);
        }

        .result {
            font-weight: bold;
            font-size: 16px;
            color: #0056b3;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }

        hr {
            margin: 30px 0;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Non-HDL Clinical Calculator</h1>

    <h2>Formula 1</h2>
    <p><strong>Non-HDL = Total Cholesterol − HDL</strong></p>

    <label>Total Cholesterol (mg/dL)</label>
    <input type="number" id="totalChol" placeholder="Enter total cholesterol">

    <label>HDL (mg/dL)</label>
    <input type="number" id="hdl" placeholder="Enter HDL">

    <button onclick="calculateNonHDL()">Calculate Non-HDL</button>

    <div class="result" id="result1"></div>

    <hr>

    <h2>Formula 2</h2>
    <p><strong>Non-HDL Target = LDL Target + 30</strong></p>

    <label>LDL Target (mg/dL)</label>
    <input type="number" id="ldlTarget" placeholder="Enter LDL target">

    <button onclick="calculateTarget()">Calculate Non-HDL Target</button>

    <div class="result" id="result2"></div>

</div>

<script>
    function calculateNonHDL() {
        const total = parseFloat(document.getElementById("totalChol").value);
        const hdl = parseFloat(document.getElementById("hdl").value);

        if (isNaN(total) || isNaN(hdl)) {
            document.getElementById("result1").innerText = "Please enter valid numbers.";
            return;
        }

        const nonHDL = total - hdl;
        document.getElementById("result1").innerText = "Non-HDL: " + nonHDL.toFixed(1) + " mg/dL";
    }

    function calculateTarget() {
        const ldl = parseFloat(document.getElementById("ldlTarget").value);

        if (isNaN(ldl)) {
            document.getElementById("result2").innerText = "Please enter a valid number.";
            return;
        }

        const target = ldl + 30;
        document.getElementById("result2").innerText = "Non-HDL Target: " + target.toFixed(1) + " mg/dL";
    }
</script>

</body>
</html>

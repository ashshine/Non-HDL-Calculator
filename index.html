<!DOCTYPE html>
<html>
<head>
  <title>Non-HDL Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 420px;
      margin: 40px auto;
      padding: 20px;
      background-color: #f4f6f8;
    }
    h2 {
      text-align: center;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      font-size: 16px;
    }
    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
    button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<h2>Non-HDL Cholesterol Calculator</h2>

<label>Total Cholesterol (mg/dL)</label>
<input type="number" id="totalChol" min="0" oninput="calculate()">

<label>HDL (mg/dL)</label>
<input type="number" id="hdl" min="0" oninput="calculate()">

<label>LDL Target (mg/dL)</label>
<input type="number" id="ldlTarget" min="0" oninput="calculate()">

<div class="result">
  <p id="nonHdlResult">Non-HDL: --</p>
  <p id="targetResult">Non-HDL Target: --</p>
</div>

<button onclick="exportPDF()">Export as PDF</button>

<script>
function calculate() {
  let total = parseFloat(document.getElementById("totalChol").value);
  let hdl = parseFloat(document.getElementById("hdl").value);
  let ldlTarget = parseFloat(document.getElementById("ldlTarget").value);

  if (isNaN(total) || isNaN(hdl) || isNaN(ldlTarget)) {
    return;
  }

  let nonHdl = total - hdl;
  let nonHdlTarget = ldlTarget + 30;

  let nonHdlText = document.getElementById("nonHdlResult");
  let targetText = document.getElementById("targetResult");

  nonHdlText.innerHTML = "Non-HDL: " + nonHdl.toFixed(1) + " mg/dL";
  targetText.innerHTML = "Non-HDL Target: " + nonHdlTarget.toFixed(1) + " mg/dL";

  if (nonHdl > nonHdlTarget) {
    nonHdlText.style.color = "red";
  } else {
    nonHdlText.style.color = "black";
  }
}

function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let total = document.getElementById("totalChol").value;
  let hdl = document.getElementById("hdl").value;
  let ldlTarget = document.getElementById("ldlTarget").value;
  let nonHdl = document.getElementById("nonHdlResult").innerText;
  let target = document.getElementById("targetResult").innerText;

  doc.text("Non-HDL Cholesterol Report", 20, 20);
  doc.text("Total Cholesterol: " + total + " mg/dL", 20, 40);
  doc.text("HDL: " + hdl + " mg/dL", 20, 50);
  doc.text("LDL Target: " + ldlTarget + " mg/dL", 20, 60);
  doc.text(nonHdl, 20, 80);
  doc.text(target, 20, 90);

  doc.save("Non-HDL-Report.pdf");
}
</script>

</body>
</html>

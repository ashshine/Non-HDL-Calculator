<!DOCTYPE html>
<html>
<head>
<title>Non-HDL Calculator</title>

<meta name="apple-mobile-web-app-title" content="Non-HDL Calculator">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">
<meta name="theme-color" content="#003366">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #e6f0ff, #f4f9ff);
}
#splash {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #003366;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}
.loader {
    margin-top: 20px;
    border: 4px solid #ffffff40;
    border-top: 4px solid white;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
}
@keyframes spin { 100% { transform: rotate(360deg); } }

.container {
    padding: 40px;
    max-width: 500px;
    margin: auto;
    display: none;
    animation: fadeIn 0.6s ease-in-out;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

h1, h2 { text-align: center; color: #003366; }

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0 20px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}

.result { font-weight: bold; }

.warning-box {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    display: none;
    text-align: center;
    font-weight: bold;
}

.danger { background:#ffe6e6; color:red; border:1px solid red; }
.safe { background:#e6ffe6; color:green; border:1px solid green; }

#installBtn { display:none; background:green; }

#iosBanner {
    display:none;
    background:#fff3cd;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    font-weight:500;
}
</style>
</head>

<body>

<div id="splash">
    <h1>Non-HDL Calculator</h1>
    <div>Professional Lipid Tool</div>
    <div class="loader"></div>
</div>

<div class="container" id="app">

<div id="iosBanner">
🍎 <strong>iPhone & iPad Users:</strong><br>
To install this app, tap <strong>Share</strong> then select <strong>Add to Home Screen</strong>.
</div>

<button id="installBtn">Install App</button>

<h2>Formula 1</h2>
<p><strong>Non-HDL = Total − HDL</strong></p>

<input type="number" id="totalChol" placeholder="Total Cholesterol" oninput="calculate()">
<input type="number" id="hdl" placeholder="HDL" oninput="calculate()">

<div class="result" id="result1">Non-HDL: --</div>

<hr>

<h2>Formula 2</h2>
<p><strong>Non-HDL Target = LDL + 30</strong></p>

<input type="number" id="ldlTarget" placeholder="LDL Target" oninput="calculate()">
<div class="result" id="result2">Non-HDL Target: --</div>

<div id="comparisonBox" class="warning-box"></div>

<button onclick="exportPDF()">Export as PDF</button>

</div>

<script>
window.onload = () => {
    setTimeout(() => {
        document.getElementById("splash").style.display = "none";
        document.getElementById("app").style.display = "block";
    }, 1200);
};

function calculate() {
    const total = parseFloat(totalChol.value);
    const hdlv = parseFloat(hdl.value);
    const ldlv = parseFloat(ldlTarget.value);

    let nonHDL = null;
    let target = null;

    if (!isNaN(total) && !isNaN(hdlv)) {
        nonHDL = total - hdlv;
        result1.innerText = "Non-HDL: " + nonHDL.toFixed(1);
    } else result1.innerText = "Non-HDL: --";

    if (!isNaN(ldlv)) {
        target = ldlv + 30;
        result2.innerText = "Non-HDL Target: " + target.toFixed(1);
    } else result2.innerText = "Non-HDL Target: --";

    if (nonHDL !== null && target !== null) {
        comparisonBox.style.display = "block";
        if (nonHDL > target) {
            comparisonBox.className = "warning-box danger";
            comparisonBox.innerHTML = "⚠ ABOVE target: " + nonHDL.toFixed(1);
        } else {
            comparisonBox.className = "warning-box safe";
            comparisonBox.innerHTML = "✓ Within target";
        }
    } else {
        comparisonBox.style.display = "none";
    }
}

function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const total = parseFloat(totalChol.value);
    const hdlv = parseFloat(hdl.value);
    const ldlv = parseFloat(ldlTarget.value);

    const nonHDL = (!isNaN(total) && !isNaN(hdlv)) ? (total - hdlv) : null;
    const target = (!isNaN(ldlv)) ? (ldlv + 30) : null;

    const today = new Date();
    const dateString = today.toLocaleString();

    const logo = new Image();
    logo.src = "logo.png";

    logo.onload = function() {

        // Header Background
        doc.setFillColor(0, 51, 102);
        doc.rect(0, 0, 210, 30, "F");

        // Logo (top right)
        doc.addImage(logo, "PNG", 160, 6, 35, 15);

        // Title
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(16);
        doc.text("Non-HDL Cholesterol Report", 14, 14);

        // Date under title
        doc.setFontSize(10);
        doc.text("Generated: " + dateString, 14, 22);

        // Reset text color
        doc.setTextColor(0, 0, 0);

        let y = 45;

        // INPUT VALUES
        doc.setFontSize(13);
        doc.text("Input Values", 14, y);
        y += 10;

        doc.setFontSize(11);
        doc.text("Total Cholesterol: " + (total || "--") + " mg/dL", 14, y); y += 8;
        doc.text("HDL: " + (hdlv || "--") + " mg/dL", 14, y); y += 8;
        doc.text("LDL Target: " + (ldlv || "--") + " mg/dL", 14, y); y += 15;

        // RESULTS
        doc.setFontSize(13);
        doc.text("Calculated Results", 14, y);
        y += 10;

        doc.setFontSize(11);
        doc.text("Non-HDL: " + (nonHDL !== null ? nonHDL.toFixed(1) : "--") + " mg/dL", 14, y); y += 8;
        doc.text("Non-HDL Target: " + (target !== null ? target.toFixed(1) : "--") + " mg/dL", 14, y); y += 15;

        // INTERPRETATION BOX
        if (nonHDL !== null && target !== null) {
            if (nonHDL > target) {
                doc.setFillColor(204, 0, 0);
                doc.rect(14, y, 182, 10, "F");
                doc.setTextColor(255, 255, 255);
                doc.text("ABOVE TARGET", 105, y + 7, { align: "center" });
                doc.setTextColor(0, 0, 0);
                y += 18;
                doc.text("The calculated Non-HDL cholesterol exceeds the recommended target based on the provided LDL goal.", 14, y);
            } else {
                doc.setFillColor(0, 153, 0);
                doc.rect(14, y, 182, 10, "F");
                doc.setTextColor(255, 255, 255);
                doc.text("WITHIN TARGET", 105, y + 7, { align: "center" });
                doc.setTextColor(0, 0, 0);
                y += 18;
                doc.text("The calculated Non-HDL cholesterol is within the recommended target range.", 14, y);
            }
        }

        // DISCLAIMER
        y += 25;
        doc.setFontSize(9);
        doc.setTextColor(100);
        doc.text("This tool is intended for clinical estimation purposes only. Clinical decisions should be based on full patient evaluation.", 14, y);

        // FOOTER
        y += 10;
        doc.text("Generated by Non-HDL Calculator | Version 2.0", 14, y);

        doc.save("Non-HDL-Report.pdf");
    };
}

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

let deferredPrompt;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'block';
});

installBtn.addEventListener('click', () => {
    installBtn.style.display = 'none';
    deferredPrompt.prompt();
});

const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isSafari = /safari/i.test(navigator.userAgent) && !/crios|fxios/i.test(navigator.userAgent);

if (isIOS && isSafari) {
    document.getElementById("iosBanner").style.display = "block";
}
</script>

<p style="text-align:center; color:#888; font-size:12px; margin-top:25px;">
💡 After the first online visit, this app works fully offline.
</p>

</body>
</html>

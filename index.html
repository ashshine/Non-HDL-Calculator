<!DOCTYPE html>
<html>
<head>
  <title>Non-HDL Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      background: #f8f9fb;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .section {
      margin-bottom: 30px;
      padding: 15px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 6px 0 12px 0;
      font-size: 15px;
    }

    .result {
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<h2>Non-HDL Cholesterol Calculator</h2>

<!-- SECTION 1 -->
<div class="section">
  <h3>Formula 1</h3>
  <p><strong>Non-HDL = Total Cholesterol − HDL</strong></p>

  <label>Total Cholesterol (mg/dL)</label>
  <input type="number" id="total" min="0" oninput="calculateNonHDL()">

  <label>HDL (mg/dL)</label>
  <input type="number" id="hdl" min="0" oninput="calculateNonHDL()">

  <div class="result" id="nonhdlResult">
    Non-HDL: --
  </div>
</div>

<!-- SECTION 2 -->
<div class="section">
  <h3>Formula 2</h3>
  <p><strong>Non-HDL Target = LDL Target + 30</strong></p>

  <label>LDL Target (mg/dL)</label>
  <input type="number" id="ldlTarget" min="0" oninput="calculateTarget()">

  <div class="result" id="targetResult">
    Non-HDL Target: --
  </div>
</div>

<button onclick="exportPDF()">Export as PDF</button>

<script>
let currentNonHDL = null;
let currentTarget = null;

function calculateNonHDL() {
  let total = parseFloat(document.getElementById("total").value);
  let hdl = parseFloat(document.getElementById("hdl").value);

  if (!isNaN(total) && !isNaN(hdl)) {
    currentNonHDL = total - hdl;
    document.getElementById("nonhdlResult").innerHTML =
      "Non-HDL: " + currentNonHDL.toFixed(1) + " mg/dL";
  } else {
    currentNonHDL = null;
    document.getElementById("nonhdlResult").innerHTML = "Non-HDL: --";
  }

  compareValues();
}

function calculateTarget() {
  let ldl = parseFloat(document.getElementById("ldlTarget").value);

  if (!isNaN(ldl)) {
    currentTarget = ldl + 30;
    document.getElementById("targetResult").innerHTML =
      "Non-HDL Target: " + currentTarget.toFixed(1) + " mg/dL";
  } else {
    currentTarget = null;
    document.getElementById("targetResult").innerHTML = "Non-HDL Target: --";
  }

  compareValues();
}

function compareValues() {
  let resultDiv = document.getElementById("nonhdlResult");

  if (currentNonHDL !== null && currentTarget !== null) {
    if (currentNonHDL > currentTarget) {
      resultDiv.style.color = "red";
    } else {
      resultDiv.style.color = "black";
    }
  }
}

function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text("Non-HDL Cholesterol Report", 20, 20);
  doc.text(document.getElementById("nonhdlResult").innerText, 20, 40);
  doc.text(document.getElementById("targetResult").innerText, 20, 50);

  doc.save("Non-HDL-Report.pdf");
}
</script>

</body>
</html>
